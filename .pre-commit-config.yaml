repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.17"
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: '\.svg$'
      - id: check-yaml
      - id: debug-statements
        language_version: python3
  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout
        files: \.(ipynb)$
        args: [--keep-output, --drop-empty-cells]
  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format
        name: Format TOML files
        args: ["--config", "taplo.toml"]
        exclude: ^tests/toml_files/corrupt.toml$
      - id: taplo-lint
        name: Lint TOML files
        args: ["--config", "taplo.toml"]
        exclude: ^tests/toml_files/corrupt.toml$
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: ["--config", ".markdownlint.json"]
        exclude: ^\.claude/
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.25.2
    hooks:
      - id: zizmor
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        language: system
        entry: uv run pytest --cov=openretailscience --cov-report=xml --cov-branch tests --ignore=tests/integration
        types: [python]
        pass_filenames: false
        files: ^openretailscience/
