name: Snowflake Integration Tests

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      GCP_SA_KEY:
        required: true
      GCP_INFRA_PROJECT_ID:
        required: true
      SNOWFLAKE_CI_ACCOUNT:
        required: true
      SNOWFLAKE_CI_USER:
        required: true
      SNOWFLAKE_CI_WAREHOUSE:
        required: true
      SNOWFLAKE_CI_DATABASE:
        required: true
      SNOWFLAKE_CI_SCHEMA:
        required: true

permissions:
  contents: read

jobs:
  integration-tests:
    name: Run Snowflake Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install uv Package
        run: |
          pip install --upgrade pip
          pip install uv==0.5.30

      - name: Install Dependencies
        run: |
          uv sync

      - name: Set up GCP Authentication
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Fetch Snowflake CI Key
        env:
          GCP_INFRA_PROJECT_ID: ${{ secrets.GCP_INFRA_PROJECT_ID }}
        run: |
          umask 077
          gcloud secrets versions access latest \
            --secret=snowflake-ci-private-key \
            --project="$GCP_INFRA_PROJECT_ID" > /tmp/snowflake_ci_key.p8

      - name: Run Integration Tests
        env:
          SNOWFLAKE_CI_ACCOUNT: ${{ secrets.SNOWFLAKE_CI_ACCOUNT }}
          SNOWFLAKE_CI_USER: ${{ secrets.SNOWFLAKE_CI_USER }}
          SNOWFLAKE_CI_WAREHOUSE: ${{ secrets.SNOWFLAKE_CI_WAREHOUSE }}
          SNOWFLAKE_CI_DATABASE: ${{ secrets.SNOWFLAKE_CI_DATABASE }}
          SNOWFLAKE_CI_SCHEMA: ${{ secrets.SNOWFLAKE_CI_SCHEMA }}
          SNOWFLAKE_CI_PRIVATE_KEY_PATH: /tmp/snowflake_ci_key.p8
        run: |
          uv run pytest tests/integration -k "snowflake" -v

      - name: Cleanup private key
        if: always()
        run: rm -f /tmp/snowflake_ci_key.p8
