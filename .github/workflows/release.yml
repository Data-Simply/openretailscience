name: PyPi Package Deploy
on:
  workflow_dispatch:
    inputs:
      release:
        type: choice
        description: Select Release Type
        default: "minor"
        options:
          - major
          - minor
          - patch
permissions:
  contents: write
  deployments: write
  packages: write
concurrency:
  group: "release"
  cancel-in-progress: false
jobs:
  pre-commit:
    name: Pre-Commit Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install UV
        run: |
          pip install --upgrade pip
          pip install uv==0.5.30
          uv sync
      - name: Install Pre-commit in uv environment
        run: uv run pip install pre-commit
      - name: Run Pre-commit
        run: pre-commit run --all-files

  bigquery-integration-tests:
    name: BigQuery Integration Tests
    uses: ./.github/workflows/bigquery-integration.yml
    secrets: inherit

  pyspark-integration-tests:
    name: PySpark Integration Tests
    uses: ./.github/workflows/pyspark-integration.yml
    secrets: inherit

  snowflake-integration-tests:
    name: Snowflake Integration Tests
    uses: ./.github/workflows/snowflake-integration.yml
    secrets: inherit

  multi-python-tests:
    name: Multi-Python Version Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install UV
        run: |
          pip install --upgrade pip
          pip install uv==0.5.30
      - name: Install dependencies
        run: |
          uv sync
      - name: Run tests (excluding integration)
        run: |
          uv run pytest tests/ --ignore=tests/integration --tb=short -v

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [pre-commit, bigquery-integration-tests, pyspark-integration-tests, snowflake-integration-tests, multi-python-tests]
    env:
      CI_COMMIT_MESSAGE: Continuous Integration Version Bump ${{ inputs.release }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install uv Package
        run: |
          pip install --upgrade pip
          pip install build
          pip install uv==0.5.30
      - name: Install Dependencies
        run: uv sync --group dev
      - name: Bump Version
        run: |
          uv run python - <<EOF
          from tomlkit import parse, dumps
          from tomlkit.toml_file import TOMLFile
          file = TOMLFile("pyproject.toml")
          doc = file.read()
          version = doc["project"]["version"]
          release = "${{ inputs.release }}"
          major, minor, patch = map(int, version.split('.'))
          if release == "major":
              new_version = f"{major + 1}.0.0"
          elif release == "minor":
              new_version = f"{major}.{minor + 1}.0"
          elif release == "patch":
              new_version = f"{major}.{minor}.{patch + 1}"
          doc["project"]["version"] = new_version
          file.write(doc)
          print(f"New Version: {new_version}")
          EOF
          echo "RELEASE_TAG=$(uv run python -c 'from tomlkit.toml_file import TOMLFile; print(TOMLFile("pyproject.toml").read()["project"]["version"])')" >> $GITHUB_ENV
      - name: Build package
        run: python -m build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build
          path: dist/
          retention-days: 1
      - name: GIT commit and tag
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add pyproject.toml
          git commit -m "${{ env.CI_COMMIT_MESSAGE }}"
          git push
          echo "Tagging new version: $RELEASE_TAG"
          git tag -a "$RELEASE_TAG" -m "Auto-generated tag"
          git push origin "$RELEASE_TAG"
      - name: "Create release"
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          script: |
            if (!process.env.RELEASE_TAG) {
              core.setFailed("The environment variable RELEASE_TAG is not defined.");
              return;
            }
            try {
              const response = await github.rest.repos.createRelease({
                draft: false,
                generate_release_notes: true,
                name: process.env.RELEASE_TAG,
                owner: context.repo.owner,
                prerelease: false,
                repo: context.repo.repo,
                tag_name: process.env.RELEASE_TAG,
              });
              core.exportVariable('RELEASE_ID', response.data.id);
              core.exportVariable('RELEASE_UPLOAD_URL', response.data.upload_url);
            } catch (error) {
              core.setFailed(error.message);
            }
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    environment:
      name: production
      url: "https://pypi.org/project/openretailscience"
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build
          path: dist
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
  deploy-docs:
    name: Deploy Documentation
    needs: pypi-publish
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/gh-page.yml
