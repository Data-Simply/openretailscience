[formatting]
# Enable alignment of values in tables Align entries vertically
align_entries = true

# Align comments
align_comments = true

# Add trailing commas in arrays/tables
array_trailing_comma = true
table_trailing_comma = true

# Indentation (spaces)
indent_string = "    "
indent_tables = false

column_width = 120

# Keep newlines in arrays
compact_arrays = false

# Compact inline tables
compact_inline_tables = false

# Controls reordering of keys in tables
# reorder_arrays kept false: some arrays (e.g. plot.color.multi_color_palette in
# options_template.toml) carry semantic order, and `test_options_template_matches_defaults`
# pins the order against the runtime defaults.
reorder_arrays        = false
reorder_inline_tables = true
reorder_keys          = true

# Reformat TOML standard document (reduces custom formatting)
reformat_arrays = true

# Don't use CRLF for line endings
crlf = false
